name: Build Legacy C# Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. فك ضغط ملف الـ ZIP
    - name: Unzip Project Files
      run: |
        if (Test-Path *.zip) {
          Expand-Archive -Path *.zip -DestinationPath "." -Force
          Remove-Item *.zip
        }

    # 2. إضافة أداة MSBuild و NuGet إلى النظام
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      
    # 3. تثبيت الحزمة المرجعية وضمان دمجها في النظام تلقائياً
    - name: Restore NuGet Packages and Reference Assemblies
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($projectFile) {
            # تثبيت الحزمة المرجعية لنسخة 4.0 مباشرة للمشروع
            nuget install Microsoft.NETFramework.ReferenceAssemblies -Version 1.0.3 -OutputDirectory ./packages
            nuget restore $projectFile.FullName
        }

    # 4. البناء الكلاسيكي المباشر
    - name: Build with MSBuild
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($projectFile) {
            Write-Host "Building project: $($projectFile.FullName)"
            msbuild $($projectFile.FullName) /t:Build /p:Configuration=Release /p:CustomAfterMicrosoftCommonTargets="${{ github.workspace }}/packages/Microsoft.NETFramework.ReferenceAssemblies.1.0.3/build/Microsoft.NETFramework.ReferenceAssemblies.targets"
        } else {
            Write-Error "No .csproj file found!"
            exit 1
        }

    # 5. رفع المجلد النهائي الذي يحتوي على ملف الـ EXE
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyCSharpAppExecutable
        path: "**/bin/Release/"
