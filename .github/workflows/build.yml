name: Build Legacy C# Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. فك ضغط ملف الـ ZIP
    - name: Unzip Project Files
      run: |
        if (Test-Path *.zip) {
          Expand-Archive -Path *.zip -DestinationPath "." -Force
          Remove-Item *.zip
        }

    # 2. إضافة أداة MSBuild الخاصة بالنسخ الكلاسيكية إلى النظام
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. استعادة أي مكتبات NuGet قديمة خاصة بالمشروع
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      
    - name: Restore NuGet Packages
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($projectFile) {
            nuget restore $projectFile.FullName
        }

    # 4. بناء المشروع بالإعدادات الافتراضية للملف لتفادي تعارض الخصائص
    - name: Build with MSBuild
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($projectFile) {
            Write-Host "Building project: $($projectFile.FullName)"
            msbuild $($projectFile.FullName) /t:Build /p:DeployOnBuild=true
        } else {
            Write-Error "No .csproj file found!"
            exit 1
        }

    # 5. رفع المجلد النهائي الذي يحتوي على الملفات الناتجة (سواء كانت في Debug أو Release)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyCSharpAppExecutable
        path: "**/bin/"
