name: Build C# Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. فك ضغط الملف في المجلد الرئيسي مباشرة
    - name: Unzip Project Files
      run: |
        if (Test-Path *.zip) {
          Expand-Archive -Path *.zip -DestinationPath "." -Force
          Remove-Item *.zip
        }

    # 2. تثبيت دوت نت (تم إضافة الإصدار 6 و 7 و 8 معاً لضمان التوافق التام)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          7.0.x
          8.0.x

    # 3. البحث التلقائي عن ملف المشروع وبنائه
    - name: Publish Build
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true

    # 4. رفع الملف التنفيذي الناتج
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyCSharpAppExecutable
        path: "**/bin/Release/**/publish/"
