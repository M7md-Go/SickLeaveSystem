name: Build C# Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. فك ضغط ملف الـ ZIP
    - name: Unzip Project Files
      run: |
        if (Test-Path *.zip) {
          Expand-Archive -Path *.zip -DestinationPath "." -Force
          Remove-Item *.zip
        }

    # 2. تثبيت إصدارات دوت نت
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          7.0.x
          8.0.x

    # 3. البحث التلقائي عن ملف الـ csproj داخل أي مجلد فرعي وبنائه مباشرة
    - name: Publish Build
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($projectFile) {
            Write-Host "Found project file at: $($projectFile.FullName)"
            dotnet publish $($projectFile.FullName) -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true
        } else {
            Write-Error "No .csproj file found in the repository!"
            exit 1
        }

    # 4. رفع الملف التنفيذي الناتج من أي مجلد فرعي تم البناء فيه
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyCSharpAppExecutable
        path: "**/bin/Release/**/publish/"
